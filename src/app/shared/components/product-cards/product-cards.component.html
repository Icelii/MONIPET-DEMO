<div class="card h-100 shadow-sm overflow-hidden" [ngClass]="{ 'card-full-width': isProductRoute }">
    <img src="/images/testProduct.webp" class="card-img-top object-fit-cover" alt="Producto" loading="lazy">
    
    <div class="mt-4 card-body d-flex flex-column justify-content-between">
      <div class="d-flex justify-content-between align-items-start">
        <h2 class="productName">Plato para comida</h2>
        <button type="button" class="btn btnHeart p-2">
            <svg  xmlns="http://www.w3.org/2000/svg"  width="24"  height="24"  viewBox="0 0 24 24"  fill="none"  stroke="#fff"  stroke-width="2"  stroke-linecap="round"  stroke-linejoin="round"  class="icon icon-tabler icons-tabler-outline icon-tabler-heart"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M19.5 12.572l-7.5 7.428l-7.5 -7.428a5 5 0 1 1 7.5 -6.566a5 5 0 1 1 7.5 6.572" /></svg>
        </button>
      </div>

    <div class="d-flex mt-2 mt-sm-0 mt-lg-0 align-items-center gap-2 mb-2">
        <div class="d-flex align-items-center gap-1"> 
            <ng-container *ngFor="let star of [1,2,3,4,5]">
                <svg svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"stroke="#2b2d2f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icons-tabler-outline icon-tabler-star"><path stroke="none" d="M0 0h24v24H0z" fill="none" /><path d="M12 17.75l-6.172 3.245l1.179 -6.873l-5 -4.867l6.9 -1l3.086 -6.253l3.086 6.253l6.9 1l-5 4.867l1.179 6.873z" /></svg>
            </ng-container>
        </div>
        <div class="text-muted small d-flex align-items-center gap-1">
            <svg  xmlns="http://www.w3.org/2000/svg"  width="20"  height="20"  viewBox="0 0 24 24"  fill="none"  stroke="#6b6f73"  stroke-width="2"  stroke-linecap="round"  stroke-linejoin="round"  class="icon icon-tabler icons-tabler-outline icon-tabler-message-dots"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M12 11v.01" /><path d="M8 11v.01" /><path d="M16 11v.01" /><path d="M18 4a3 3 0 0 1 3 3v8a3 3 0 0 1 -3 3h-5l-5 3v-3h-2a3 3 0 0 1 -3 -3v-8a3 3 0 0 1 3 -3z" /></svg>
            <small class="comments">{{ comments }}</small>
        </div>
    </div>

      <div class="mt-4">
        <div class="d-flex flex-column flex-sm-row align-items-start align-items-sm-center justify-content-between mb-4">
            <div class="d-flex flex-column">
                <div *ngIf="discount > 0">
                    <div class="d-flex align-items-center justify-content-between">
                        <span class="text-decoration-line-through text-muted me-1 lastPrice">${{ price.toFixed(2) }}</span><span class="text-muted lastPrice me-2">Mxn</span>
                        <span [ngClass]="isProductRoute ? 'badge2' : 'badge'">-{{ discount }}%</span>
                    </div>
                </div>
                <div *ngIf="discount > 0">
                    <div class="mt-2 d-flex align-items-center justify-content-between">
                        <h2 class="price">${{ priceDiscount.toFixed(2) }} Mxn</h2>
                    </div>
                </div>
                <div *ngIf="discount === 0">
                    <div class="d-flex align-items-center justify-content-start mb-2">
                        <h2 class="price">${{ price.toFixed(2) }} Mxn</h2>
                    </div>
                </div>
            </div>

            <button type="button" class="mt-3 mt-sm-0 btn" [ngClass]="isProductRoute ? 'btnShop2' : 'btnShop'" >
                <svg  xmlns="http://www.w3.org/2000/svg"  width="24"  height="24"  viewBox="0 0 24 24"  fill="none"  stroke="#fff"  stroke-width="2"  stroke-linecap="round"  stroke-linejoin="round"  class="icon icon-tabler icons-tabler-outline icon-tabler-shopping-bag"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M6.331 8h11.339a2 2 0 0 1 1.977 2.304l-1.255 8.152a3 3 0 0 1 -2.966 2.544h-6.852a3 3 0 0 1 -2.965 -2.544l-1.255 -8.152a2 2 0 0 1 1.977 -2.304z" /><path d="M9 11v-5a3 3 0 0 1 6 0v5" /></svg>
            </button>
        </div>
      </div>

      <div class="d-flex flex-wrap gap-2">
        <span *ngFor="let category of categories" class="badge categories">{{ category }}</span>
      </div>
    </div>
</div>
