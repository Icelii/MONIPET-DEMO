<div class="resumeContainer v-100">
    <div class="d-flex flex-column gap-3">
        <h5 class="title">Resumen</h5>
        <div class="d-flex justify-content-between align-items-center">
            <h5 class="subTitle">Subtotal sin descuento: </h5>
            <h5 class="subTitle">${{ subtotal.toFixed(2) }} Mxn</h5>
        </div>
        <div class="d-flex justify-content-between align-items-center">
            <h5 class="subTitle">Descuento aplicado: </h5>
            <h5 class="subTitle">-${{ discountApply.toFixed(2) }} Mxn</h5>
        </div>
        <hr>
        <div class="d-flex justify-content-between align-items-center">
            <h5 class="subTitle">Total: </h5>
            <h5 class="total">${{ total.toFixed(2) }} Mxn</h5>
        </div>
        <div *ngIf="cancel === null && pay">
            <button type="submit" class="mt-2 btn btnPay">{{ btnLabel }}</button>
        </div>
        <div *ngIf="cancel === 'order'">
            <button type="submit" class="mt-2 btn btnCancel">
                <svg  xmlns="http://www.w3.org/2000/svg"  width="24"  height="24"  viewBox="0 0 24 24"  fill="none"  stroke="#fff"  stroke-width="2"  stroke-linecap="round"  stroke-linejoin="round"  class="me-1 icon icon-tabler icons-tabler-outline icon-tabler-receipt-off"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M5 21v-16m2 -2h10a2 2 0 0 1 2 2v10m0 4.01v1.99l-3 -2l-2 2l-2 -2l-2 2l-2 -2l-3 2" /><path d="M11 7l4 0" /><path d="M9 11l2 0" /><path d="M13 15l2 0" /><path d="M15 11l0 .01" /><path d="M3 3l18 18" /></svg>
                Cancelar orden
            </button>
        </div>

        <div *ngIf="cancel === 'appointment'">
            <button type="submit" class="mt-2 btn btnCancel">
                <svg  xmlns="http://www.w3.org/2000/svg"  width="24"  height="24"  viewBox="0 0 24 24"  fill="none"  stroke="currentColor"  stroke-width="2"  stroke-linecap="round"  stroke-linejoin="round"  class="me-1 icon icon-tabler icons-tabler-outline icon-tabler-calendar-off"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M9 5h9a2 2 0 0 1 2 2v9m-.184 3.839a2 2 0 0 1 -1.816 1.161h-12a2 2 0 0 1 -2 -2v-12a2 2 0 0 1 1.158 -1.815" /><path d="M16 3v4" /><path d="M8 3v1" /><path d="M4 11h7m4 0h5" /><path d="M3 3l18 18" /></svg>
                Cancelar cita
            </button>
        </div>
    </div>
</div>
