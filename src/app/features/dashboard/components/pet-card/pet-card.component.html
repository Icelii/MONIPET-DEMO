<div class="card py-md-3 px-md-2 py-3 px-4">
  <div class="d-flex flex-column flex-md-row justify-content-between align-items-start">
    <div class="imgContainer d-flex align-items-center justify-content-center" tabindex="0" id="infoPetBtn" (click)="showInfoModal = true" style="cursor:  pointer;">
      <img *ngIf="photo_link && photo_link.trim() !== ''" src="{{ photo_link }}" alt="" />

       <img *ngIf="!photo_link || photo_link.trim() === ''" class="defaultImgBackground logo" src="/logos/logomark-grey.svg" alt="Logo Monipet">
    </div>

    <div class="d-flex flex-column flex-grow-1 ms-md-3 mt-3 mt-md-0">
      <h5 class="petName mb-2">{{ name }}</h5>

      <div class="mb-3 d-flex flex-wrap gap-1">
        <ng-container [ngSwitch]="gender">
          <div *ngSwitchCase = "'Macho'" class="badgeSexMale me-1 d-flex flex-row justify-content-center align-items-center">
              <span class="me-1 mb-0">Macho</span>
              <svg  xmlns="http://www.w3.org/2000/svg"  width="16"  height="16"  viewBox="0 0 24 24"  fill="none"  stroke="var(--male-gender-color)"  stroke-width="2"  stroke-linecap="round"  stroke-linejoin="round"  class="icon icon-tabler icons-tabler-outline icon-tabler-gender-male"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M10 14m-5 0a5 5 0 1 0 10 0a5 5 0 1 0 -10 0" /><path d="M19 5l-5.4 5.4" /><path d="M19 5h-5" /><path d="M19 5v5" /></svg>
          </div>
          
          <div *ngSwitchCase = "'Hembra'" class="badgeSexFemale me-1 d-flex flex-row justify-content-center align-items-center">
            <span class="me-1 mb-0">Hembra</span>
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--female-gender-color)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icons-tabler-outline icon-tabler-gender-female"><path stroke="none" d="M0 0h24v24H0z" fill="none" /><path d="M12 9m-5 0a5 5 0 1 0 10 0a5 5 0 1 0 -10 0" /><path d="M12 14v7" /><path d="M9 18h6" /></svg>
          </div>

          <div *ngSwitchCase = "'Desconocido'" class="badgeSexUknown me-1 d-flex flex-row justify-content-center align-items-center">
            <span class="me-1 mb-0">Desconocido</span>
            <svg  xmlns="http://www.w3.org/2000/svg"  width="16"  height="16"  viewBox="0 0 24 24"  fill="none"  stroke="var(--scondary-text)"  stroke-width="2"  stroke-linecap="round"  stroke-linejoin="round"  class="icon icon-tabler icons-tabler-outline icon-tabler-gender-neutrois"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M12 10a5 5 0 1 1 0 10a5 5 0 0 1 0 -10z" /><path d="M12 10v-7" /></svg>
          </div>
        </ng-container>

        <ng-container [ngSwitch]="spayed">
          <span *ngSwitchCase = "0" class="badgeNoSpayed me-1 mb-0">No esterilizado</span>

          <span *ngSwitchCase = "1" class="badgeSpayed me-1 mb-0">Esterilizado</span>
        </ng-container>
      </div>

      <div class="d-flex flex-column justify-content-between gap-1">
        <div class="d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center mb-3 gap-1 gap-md-5">
          <div class="d-flex flex-row justify-content-center align-items-center">
            <svg  xmlns="http://www.w3.org/2000/svg"  width="20"  height="20"  viewBox="0 0 24 24"  fill="none"  stroke="var(--text-principal)"  stroke-width="2"  stroke-linecap="round"  stroke-linejoin="round"  class="icon icon-tabler icons-tabler-outline icon-tabler-dog"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M11 5h2" /><path d="M19 12c-.667 5.333 -2.333 8 -5 8h-4c-2.667 0 -4.333 -2.667 -5 -8" /><path d="M11 16c0 .667 .333 1 1 1s1 -.333 1 -1h-2z" /><path d="M12 18v2" /><path d="M10 11v.01" /><path d="M14 11v.01" /><path d="M5 4l6 .97l-6.238 6.688a1.021 1.021 0 0 1 -1.41 .111a.953 .953 0 0 1 -.327 -.954l1.975 -6.815z" /><path d="M19 4l-6 .97l6.238 6.688c.358 .408 .989 .458 1.41 .111a.953 .953 0 0 0 .327 -.954l-1.975 -6.815z" /></svg>
            <span class="labelInfo ms-1 me-1">Raza:</span>
            <span class="dataInfo">{{ breed }}</span>
          </div>
        </div>

        <div class="d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center mb-3 gap-1 gap-md-5">
          <div class="d-flex flex-row justify-content-center align-items-center">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--text-principal)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icons-tabler-outline icon-tabler-cake"><path stroke="none" d="M0 0h24v24H0z" fill="none" /><path d="M3 20h18v-8a3 3 0 0 0 -3 -3h-12a3 3 0 0 0 -3 3v8z" /><path d="M3 14.803c.312 .135 .654 .204 1 .197a2.4 2.4 0 0 0 2 -1a2.4 2.4 0 0 1 2 -1a2.4 2.4 0 0 1 2 1a2.4 2.4 0 0 0 2 1a2.4 2.4 0 0 0 2 -1a2.4 2.4 0 0 1 2 -1a2.4 2.4 0 0 1 2 1a2.4 2.4 0 0 0 2 1c.35 .007 .692 -.062 1 -.197"/><path d="M12 4l1.465 1.638a2 2 0 1 1 -3.015 .099l1.55 -1.737z" /></svg>
            <span class="labelInfo ms-1 me-1">Edad:</span>
            <span class="dataInfo">{{ edad }}</span>
          </div>
        </div>

        <div class="d-flex flex-row justify-content-start align-items-center mb-3">
          <svg  xmlns="http://www.w3.org/2000/svg"  width="20"  height="20"  viewBox="0 0 24 24"  fill="none"  stroke="var(--text-principal)"  stroke-width="2"  stroke-linecap="round"  stroke-linejoin="round"  class="icon icon-tabler icons-tabler-outline icon-tabler-ruler-measure-2"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M12 19.875c0 .621 -.512 1.125 -1.143 1.125h-5.714a1.134 1.134 0 0 1 -1.143 -1.125v-15.875a1 1 0 0 1 1 -1h5.857c.631 0 1.143 .504 1.143 1.125z" /><path d="M12 9h-2" /><path d="M12 6h-3" /><path d="M12 12h-3" /><path d="M12 18h-3" /><path d="M12 15h-2" /><path d="M21 3h-4" /><path d="M19 3v18" /><path d="M21 21h-4" /></svg>
            <span class="labelInfo ms-1 me-1">Tamaño:</span>
            <span class="dataInfo">{{ size }}</span>
        </div>
      </div>
    </div>

    <div *ngIf="adoptionList === false && appointmentAdopt === false" class="dropdown">
      <button class="mt-md-0 d-none d-md-flex d-lg-flex mt-2 btn btnOption dropdown-toggle" data-bs-toggle="dropdown" aria-expanded="false">
          <svg  xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"  fill="none" stroke-linecap="round"  stroke-linejoin="round" class="icon icon-tabler icons-tabler-outline icon-tabler-dots"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M5 12m-1 0a1 1 0 1 0 2 0a1 1 0 1 0 -2 0" /><path d="M12 12m-1 0a1 1 0 1 0 2 0a1 1 0 1 0 -2 0" /><path d="M19 12m-1 0a1 1 0 1 0 2 0a1 1 0 1 0 -2 0" /></svg>
      </button>
        <ul class="dropdown-menu">
          <li id="addPetModalBtn" (click)="showModal = true">
            <a class="dropdown-item d-flex align-items-center gap-2">
              <span class="d-inline-flex align-items-center">
                <svg  xmlns="http://www.w3.org/2000/svg"  width="18"  height="18"  viewBox="0 0 24 24"  fill="none"  stroke="currentColor"  stroke-width="2"  stroke-linecap="round"  stroke-linejoin="round"  class="icon icon-tabler icons-tabler-outline icon-tabler-edit"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M7 7h-1a2 2 0 0 0 -2 2v9a2 2 0 0 0 2 2h9a2 2 0 0 0 2 -2v-1" /><path d="M20.385 6.585a2.1 2.1 0 0 0 -2.97 -2.97l-8.415 8.385v3h3l8.385 -8.415z" /><path d="M16 5l3 3" /></svg>
              </span>
              Editar
            </a>
          </li>
          <li (click)="deletePet($event)">
            <a class="dropdown-item d-flex align-items-center gap-2">
              <span class="d-inline-flex align-items-center">
                <svg  xmlns="http://www.w3.org/2000/svg"  width="18"  height="18"  viewBox="0 0 24 24"  fill="none"  stroke="currentColor"  stroke-width="2"  stroke-linecap="round"  stroke-linejoin="round"  class="icon icon-tabler icons-tabler-outline icon-tabler-trash"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M4 7l16 0" /><path d="M10 11l0 6" /><path d="M14 11l0 6" /><path d="M5 7l1 12a2 2 0 0 0 2 2h8a2 2 0 0 0 2 -2l1 -12" /><path d="M9 7v-3a1 1 0 0 1 1 -1h4a1 1 0 0 1 1 1v3" /></svg>              </span>
              Eliminar
            </a>
          </li>
        </ul>
    </div>


    <button *ngIf="adoptionList === false && appointmentAdopt === false" class="mt-md-0 mt-2 btn btnOptionMovile d-md-none d-lg-none" data-bs-toggle="dropdown" aria-expanded="false">
      <svg  xmlns="http://www.w3.org/2000/svg"  width="24"  height="24"  viewBox="0 0 24 24"  fill="none"  stroke="#fff"  stroke-width="2"  stroke-linecap="round"  stroke-linejoin="round"  class="me-1 icon icon-tabler icons-tabler-outline icon-tabler-settings"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M10.325 4.317c.426 -1.756 2.924 -1.756 3.35 0a1.724 1.724 0 0 0 2.573 1.066c1.543 -.94 3.31 .826 2.37 2.37a1.724 1.724 0 0 0 1.065 2.572c1.756 .426 1.756 2.924 0 3.35a1.724 1.724 0 0 0 -1.066 2.573c.94 1.543 -.826 3.31 -2.37 2.37a1.724 1.724 0 0 0 -2.572 1.065c-.426 1.756 -2.924 1.756 -3.35 0a1.724 1.724 0 0 0 -2.573 -1.066c-1.543 .94 -3.31 -.826 -2.37 -2.37a1.724 1.724 0 0 0 -1.065 -2.572c-1.756 -.426 -1.756 -2.924 0 -3.35a1.724 1.724 0 0 0 1.066 -2.573c-.94 -1.543 .826 -3.31 2.37 -2.37c1 .608 2.296 .07 2.572 -1.065z" /><path d="M9 12a3 3 0 1 0 6 0a3 3 0 0 0 -6 0" /></svg>
      Opciones
    </button>

    <div *ngIf="adoptionList === true && appointmentAdopt === false" class="d-flex flex-row-justify-content-between align-items-end">
        <label class="custom-checkbox">
            <input type="checkbox" [checked]="isSelected" (change)="toggleCheckbox()" />
            <span class="checkmark">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#2b2d2f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M5 12l5 5l10 -10" /></svg>
            </span>
        </label> 

        <button class="ms-1 mt-md-0 mt-2 btn btnDelete" title="Eliminar de la lista" (click)="removePet()">
            <svg  xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"  fill="none" stroke-linecap="round"  stroke-linejoin="round"  class="icon icon-tabler icons-tabler-outline icon-tabler-trash"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M4 7l16 0" /><path d="M10 11l0 6" /><path d="M14 11l0 6" /><path d="M5 7l1 12a2 2 0 0 0 2 2h8a2 2 0 0 0 2 -2l1 -12" /><path d="M9 7v-3a1 1 0 0 1 1 -1h4a1 1 0 0 1 1 1v3" /></svg>
        </button>
    </div>
  </div>
</div>

<app-edit-pet (updated)="onPetUpdated()" [photo_id]="photo_id" [id]="id" [isOpen]="showModal" (closed)="onModalClosed()"></app-edit-pet>
<app-info-pet
  *ngIf="showInfoModal"
  [id]="id"
  [isOpen]="showInfoModal"
  (closed)="onInfoModalClosed()">
</app-info-pet>
