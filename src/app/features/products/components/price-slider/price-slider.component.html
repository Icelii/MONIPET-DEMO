<div class="slider">
  <div class="track"></div>
  <div class="range" #range></div>

  <div class="price-tag left" [ngStyle]="{ left: leftPercent + '%' }">
    ${{ minValue }}
  </div>
  <div class="price-tag right" [ngStyle]="{ left: rightPercent + '%' }">
    ${{ maxValue }}
  </div>

  <input type="range" min="0" max="1000" value="10" #inputLeft />
  <input type="range" min="0" max="1000" value="1000" #inputRight />
</div>
