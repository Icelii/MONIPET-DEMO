<div class="container-xxl px-md-4 px-lg-5 min-vh-100 mb-5">
    <div class="row">
        <!-- SERVICES LIST -->
        <div class="col-12 col-md-8 col-lg-8 mb-4">
            <div class="d-flex flex-column justify-content-start align-items-start">
                <h5 class="title">Servicios seleccionados</h5>
                <h5 class="instructions">Puedes quitar opciones antes de confirmar tu cita.</h5>
            </div>
            <div class="mt-md-5 mt-lg-5 mt-4 row">
                @defer (when !loading()) {
                    @for (service of servicesSelected(); track service.id) {
                        <div class="col-12 col-md-6 col-lg-6 mb-3">
                            <app-service-appointment-card [service]="service.service" [medical]="false" [price]="+service.price" [discounts]="+service.discounts" [typeService]="service.type.type_service"></app-service-appointment-card>
                        </div>
                    }
                }
            </div>
        </div>

        <!-- ORDER RESUMEN -->
        <div class="col-12 col-md-4 col-lg-4 mb-3">
            <app-appointment-details [type]="typeAppointment" [selectedServices]="selectedServiceIds" [total]="total" [discount]="totalDiscount" [subTotal]="subtotal" [service]="true" [submitTo]="'Service'" [type]="''"></app-appointment-details>
        </div>
    </div>
</div>
