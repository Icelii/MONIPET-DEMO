<h4 class="text-center tittle mt-2">¡Bienvenid&#64; de nuevo!</h4>
<p class="text-center secondaryText thin mb-4">
  Inicia sesión para acceder a tu cuenta
</p>

<form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="mt-5">
  <!-- EMAIL -->
  <div class="mb-4">
    <label class="form-label" for="email">Correo electrónico</label>
    <input
      type="email"
      class="form-control customInputs"
      placeholder="ej. prueba123@gmail.com"
      formControlName="email"
    />
    <app-error-messages [control]="getControl('email')" label="Este campo"></app-error-messages>
  </div>

  <!-- CONTRASEÑA -->
  <div class="mb-1">
    <label class="form-label" for="password">Contraseña</label>
    <div class="input-group">
      <input
        [type]="mostrarPassword ? 'text' : 'password'"
        class="form-control customInputs"
        id="password"
        placeholder="Ingresa tu contraseña"
        formControlName="password"
      />

      <button type="button" class="btn bgIconEye" (click)="togglePassword()">
        <span *ngIf="!mostrarPassword">
          <img src="/icons/eye.svg" alt="eye" />
        </span>

        <span *ngIf="mostrarPassword">
          <img src="/icons/eye-off.svg" alt="eye-off" />
        </span>
      </button>
    </div>
    <app-error-messages [control]="getControl('password')" label="Este campo"></app-error-messages>
  </div>
  <div class="mb-4">
    <p class="mt-4 text-muted">
      <a routerLink="/account-recovery" class="fw-semibold">¿Has olvidado tu contraseña?</a>
    </p>
  </div>
  <app-button-primary label="Iniciar sesión"></app-button-primary>
</form>

<p class="text-center mt-4 text-muted">
  ¿Aún no tienes una cuenta?<a routerLink="/register" class="fw-semibold"> Registrate aquí</a>
</p>
