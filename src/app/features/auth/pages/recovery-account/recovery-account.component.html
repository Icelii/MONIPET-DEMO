<h4 class="text-center tittle mt-2">Recupera tu cuenta</h4>
<p class="text-center secondaryText thin mb-4">
  Ingresa tu correo para recibir un código de verificación.
</p>

<form [formGroup]="recoveryAccountForm" (ngSubmit)="onSubmit()" class="mt-5">
  <!-- EMAIL -->
  <div class="mb-4">
    <label class="form-label" for="email">Correo electrónico</label>
    <input
      type="email"
      id="email"
      formControlName="email"
      class="form-control customInputs"
      placeholder="ej. prueba123@gmail.com"
    />
    <app-error-messages [control]="getControl('email')" label="Este campo"></app-error-messages>
  </div>

  <app-button-primary label="Enviar código"></app-button-primary>
</form>

<p class="text-center mt-4 text-muted">
  ¿Ya la recordaste?<a routerLink="/login" class="fw-semibold"> Inicia sesión</a>
</p>
