<div class="container-fluid min-vh-100 d-flex">
  <!-- LADO IZQUIERDO -->
  <div class="d-none d-lg-block position-fixed top-0 start-0 bg-white"
       style="width: 50vw; height: 100vh; padding: 12px; box-sizing: border-box; z-index: 1;">
    <img [src]="imageUrl"
         alt="Imagen"
         class="img-fluid w-100 h-100"
         style="object-fit: cover; border-radius: 12px;"
         loading="lazy">
  </div>

  <!-- LADO DERECHO -->
  <div class="offset-lg-6 col-12 col-lg-6 d-flex flex-column justify-content-center align-items-center min-vh-100 px-4" style="z-index: 2;">
    <img src="/logos/logo-horizontal.svg" routerLink="" alt="Logo" class="mb-3 logo">
    <router-outlet></router-outlet>
  </div>

</div>
